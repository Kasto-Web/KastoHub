<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasto | Social Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4aa;
            --secondary: #00a8e8;
            --accent: #ff6b6b;
            --dark: #0a0a0f;
            --darker: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float-orb 20s infinite ease-in-out;
        }

        .bg-animation .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary), transparent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-animation .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary), transparent);
            bottom: -150px;
            left: -100px;
            animation-delay: -5s;
        }

        .bg-animation .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent), transparent);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: particle-float 15s infinite linear;
        }

        @keyframes particle-float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(0, 212, 170, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: card-appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes card-appear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Shimmer Effect on Card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.03) 50%,
                transparent 60%
            );
            animation: shimmer 8s infinite linear;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* Profile Image */
        .profile-image-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            animation: rotate-gradient 4s linear infinite, scale-in 1s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes rotate-gradient {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes scale-in {
            to { opacity: 1; transform: scale(1); }
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--darker);
            transition: transform 0.5s ease;
        }

        .profile-image-container:hover .profile-image {
            transform: scale(1.05);
        }

        /* Glow Ring */
        .glow-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* Name */
        .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 3px;
            animation: text-glow 3s infinite alternate, slide-up 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes text-glow {
            0% { filter: drop-shadow(0 0 10px rgba(0, 212, 170, 0.3)); }
            100% { filter: drop-shadow(0 0 30px rgba(0, 212, 170, 0.6)); }
        }

        @keyframes slide-up {
            to { opacity: 1; transform: translateY(0); }
        }

        .tagline {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            animation: slide-up 0.8s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        /* Social Links */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slide-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .social-link:nth-child(1) { animation-delay: 0.9s; }
        .social-link:nth-child(2) { animation-delay: 1.0s; }
        .social-link:nth-child(3) { animation-delay: 1.1s; }
        .social-link:nth-child(4) { animation-delay: 1.2s; }
        .social-link:nth-child(5) { animation-delay: 1.3s; }
        .social-link:nth-child(6) { animation-delay: 1.4s; }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:hover {
            transform: translateX(-5px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .social-link .left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .social-link .icon-wrapper {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.4s ease;
        }

        .social-link:hover .icon-wrapper {
            transform: rotate(360deg) scale(1.1);
        }

        .social-link .arrow {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s ease;
        }

        .social-link:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* YouTube */
        .youtube {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.15), rgba(255, 0, 0, 0.05));
            border-color: rgba(255, 0, 0, 0.2);
        }
        .youtube .icon-wrapper { background: linear-gradient(135deg, #ff0000, #cc0000); }
        .youtube:hover { 
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.25), rgba(255, 0, 0, 0.1));
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.2);
        }

        /* TikTok */
        .tiktok {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.1));
            border-color: rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .tiktok .icon-wrapper { 
            background: linear-gradient(135deg, #00f2ea, #ff0050);
        }
        .tiktok:hover { 
            background: linear-gradient(135deg, rgba(0, 242, 234, 0.1), rgba(255, 0, 80, 0.1));
            box-shadow: 0 10px 40px rgba(0, 242, 234, 0.2);
        }

        /* Instagram */
        .instagram {
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.15), rgba(88, 81, 219, 0.05));
            border-color: rgba(225, 48, 108, 0.2);
        }
        .instagram .icon-wrapper { 
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .instagram:hover { 
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.25), rgba(88, 81, 219, 0.1));
            box-shadow: 0 10px 40px rgba(225, 48, 108, 0.2);
        }

        /* X (Twitter) */
        .x-social {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            border-color: rgba(255, 255, 255, 0.1);
        }
        .x-social .icon-wrapper { 
            background: linear-gradient(135deg, #fff, #aaa);
            color: #000;
        }
        .x-social:hover { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
        }

        /* Facebook */
        .facebook {
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.15), rgba(24, 119, 242, 0.05));
            border-color: rgba(24, 119, 242, 0.2);
        }
        .facebook .icon-wrapper { 
            background: linear-gradient(135deg, #1877f2, #166fe5);
        }
        .facebook:hover { 
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.25), rgba(24, 119, 242, 0.1));
            box-shadow: 0 10px 40px rgba(24, 119, 242, 0.2);
        }

        /* Coming Soon Badge */
        .coming-soon {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .coming-soon .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
            animation: slide-up 0.8s 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            animation: slide-up 0.8s 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .footer i {
            color: var(--accent);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Contact Section */
        .contact-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            animation: slide-up 0.8s 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.15), rgba(0, 168, 232, 0.1));
            border: 1px solid rgba(0, 212, 170, 0.2);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s ease;
        }

        .contact-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.25), rgba(0, 168, 232, 0.2));
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.2);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            .name { font-size: 2rem; }
            .profile-image-container { width: 150px; height: 150px; }
            .social-link { padding: 15px 20px; font-size: 1rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        /* Cursor Trail */
        .cursor-trail {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="glass-card">
            <!-- Profile Image -->
            <div class="profile-image-container">
                <div class="glow-ring"></div>
                <img src="lv_0_20251112153047.jpg" alt="Kasto" class="profile-image" onerror="this.src='https://ui-avatars.com/api/?name=Kasto&background=00d4aa&color=fff&size=400'">
            </div>

            <!-- Name -->
            <h1 class="name">KASTO</h1>
            <p class="tagline">AI & Tech News, Simplified. Daily.</p>

            <!-- Social Links -->
            <div class="social-links">
                <!-- YouTube -->
                <a href="https://www.youtube.com/@Kasto_o" target="_blank" class="social-link youtube">
                    <div class="left">
                        <div class="icon-wrapper">
                            <i class="fab fa-youtube"></i>
                        </div>
                        <span>YouTube</span>
                    </div>
                    <div class="right">
                        <span style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">@Kasto_o</span>
                        <i class="fas fa-arrow-right arrow"></i>
                    </div>
                </a>

                <!-- TikTok -->
                <a href="https://www.tiktok.com/@kasto_oo" target="_blank" class="social-link tiktok">
                    <div class="left">
                        <div class="icon-wrapper">
                            <i class="fab fa-tiktok"></i>
                        </div>
                        <span>TikTok</span>
                    </div>
                    <div class="right">
                        <span style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">@kasto_oo</span>
                        <i class="fas fa-arrow-right arrow"></i>
                    </div>
                </a>

                <!-- Facebook -->
                <a href="https://www.facebook.com/profile.php?id=61591662810004" target="_blank" class="social-link facebook">
                    <div class="left">
                        <div class="icon-wrapper">
                            <i class="fab fa-facebook-f"></i>
                        </div>
                        <span>Facebook</span>
                    </div>
                    <div class="right">
                        <span style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Kasto</span>
                        <i class="fas fa-arrow-right arrow"></i>
                    </div>
                </a>

                <!-- Instagram -->
                <div class="social-link instagram" style="cursor: default;">
                    <div class="left">
                        <div class="icon-wrapper">
                            <i class="fab fa-instagram"></i>
                        </div>
                        <span>Instagram</span>
                    </div>
                    <div class="coming-soon">
                        <span class="dot"></span>
                        <span>Coming Soon</span>
                    </div>
                </div>

                <!-- X -->
                <div class="social-link x-social" style="cursor: default;">
                    <div class="left">
                        <div class="icon-wrapper">
                            <i class="fab fa-x-twitter"></i>
                        </div>
                        <span>X</span>
                    </div>
                    <div class="coming-soon">
                        <span class="dot"></span>
                        <span>Coming Soon</span>
                    </div>
                </div>
            </div>

            <!-- Contact -->
            <div class="contact-section">
                <a href="mailto:7o7ofaj@gmail.com" class="contact-btn">
                    <i class="fas fa-envelope"></i>
                    <span>7o7ofaj@gmail.com</span>
                </a>
            </div>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-number" id="subCount">0</span>
                    <span class="stat-label">Subscribers</span>
                </div>
                <div class="stat">
                    <span class="stat-number">3</span>
                    <span class="stat-label">Active Platforms</span>
                </div>
                <div class="stat">
                    <span class="stat-number">2</span>
                    <span class="stat-label">Coming Soon</span>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                Made with <i class="fas fa-heart"></i> by Kasto
            </div>
        </div>
    </div>

    <script>
        // Create Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.width = (Math.random() * 4 + 1) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Animated Counter
        function animateCounter(element, target, duration = 2000) {
            let start = 0;
            const increment = target / (duration / 16);
            const timer = setInterval(() => {
                start += increment;
                if (start >= target) {
                    element.textContent = target + '+';
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(start);
                }
            }, 16);
        }

        // Start counter after animation
        setTimeout(() => {
            animateCounter(document.getElementById('subCount'), 1000);
        }, 2000);

        // Mouse Trail Effect
        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            trail.style.left = e.clientX - 10 + 'px';
            trail.style.top = e.clientY - 10 + 'px';
            document.body.appendChild(trail);

            setTimeout(() => {
                trail.style.opacity = '0';
                trail.style.transform = 'scale(0)';
            }, 50);

            setTimeout(() => {
                trail.remove();
            }, 200);
        });

        // Parallax Effect on Card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Glitch Effect on Name (random)
        const nameElement = document.querySelector('.name');
        setInterval(() => {
            if (Math.random() > 0.95) {
                nameElement.style.textShadow = `
                    ${Math.random() * 10 - 5}px 0 #ff0000,
                    ${Math.random() * 10 - 5}px 0 #00ffff
                `;
                setTimeout(() => {
                    nameElement.style.textShadow = 'none';
                }, 100);
            }
        }, 100);
    </script>
</body>
</html>
